
<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="firebase.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
padding:20px;
}

.login-box{
background:white;
padding:35px;
border-radius:16px;
box-shadow:0 10px 35px rgba(0,0,0,0.2);
width:100%;
max-width:360px;
text-align:center;
}

.login-box h2{
margin-bottom:25px;
color:#333;
}

.input-group{
margin-bottom:18px;
text-align:left;
position:relative;
}

.input-group label{
font-size:13px;
color:#666;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-top:5px;
font-size:15px;
}

input:focus{
border-color:#007bff;
outline:none;
}

.toggle-pass{
position:absolute;
right:10px;
top:35px;
cursor:pointer;
font-size:13px;
color:#007bff;
}

button{
width:100%;
padding:13px;
border:none;
background:#007bff;
color:white;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:.2s;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

button:hover{
background:#0056b3;
}

.spinner{
width:18px;
height:18px;
border:3px solid rgba(255,255,255,0.4);
border-top:3px solid white;
border-radius:50%;
animation:spin 0.8s linear infinite;
display:none;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

.remember{
text-align:left;
margin-bottom:15px;
font-size:14px;
}

.error{
margin-top:12px;
color:red;
font-size:14px;
text-align:center;
}

/* MOBILE */

@media(max-width:480px){

body{
align-items:flex-start;
padding-top:60px;
}

.login-box{
padding:25px;
border-radius:14px;
}

}

</style>

</head>

<body>

<div class="login-box">

<h2>🔐 Login</h2>

<div class="input-group">
<label>Email</label>
<input id="email" placeholder="Enter email">
</div>

<div class="input-group">
<label>Password</label>
<input id="password" type="password" placeholder="Enter password">
<span class="toggle-pass" onclick="togglePassword()">Show</span>
</div>

<div class="remember">
<label>
<input type="checkbox" id="remember"> Remember Me
</label>
</div>

<button id="loginBtn" onclick="login()">
<span id="btnText">Login</span>
<div class="spinner" id="spinner"></div>
</button>

<div class="error" id="error"></div>

</div>


<script>

/* AUTO LOGIN */

window.onload=function(){

let userId=localStorage.getItem("user_id")
let role=localStorage.getItem("user_role")

if(userId && role){

if(role=="admin"){
window.location.href="dashboard.html"
}else{
window.location.href="expenses.html"
}

}

}


/* SHOW / HIDE PASSWORD */

function togglePassword(){

let pass=document.getElementById("password")
let toggle=document.querySelector(".toggle-pass")

if(pass.type==="password"){
pass.type="text"
toggle.innerText="Hide"
}else{
pass.type="password"
toggle.innerText="Show"
}

}


/* ENTER KEY LOGIN */

document.addEventListener("keypress",function(e){

if(e.key==="Enter"){
login()
}

})


/* LOGIN FUNCTION */

function login(){

let emailValue=document.getElementById("email").value.trim()
let passwordValue=document.getElementById("password").value.trim()

let error=document.getElementById("error")
let spinner=document.getElementById("spinner")
let btnText=document.getElementById("btnText")

let remember=document.getElementById("remember").checked

error.innerText=""

spinner.style.display="block"
btnText.innerText="Logging in..."

db.ref("users").once("value",snap=>{

let found=false

snap.forEach(u=>{

let user=u.val()

if(user.email==emailValue && user.password==passwordValue){

found=true

/* REMEMBER LOGIN */

if(remember){

localStorage.setItem("user_id",u.key)
localStorage.setItem("user_role",user.role)
localStorage.setItem("user_name",user.name)

}else{

sessionStorage.setItem("user_id",u.key)
sessionStorage.setItem("user_role",user.role)
sessionStorage.setItem("user_name",user.name)

}

/* ROLE BASED REDIRECT */

if(user.role=="admin"){
window.location.href="dashboard.html"
}else{
window.location.href="expenses.html"
}

}

})

if(!found){

spinner.style.display="none"
btnText.innerText="Login"
error.innerText="Invalid Email or Password"

}

})

}


/* LOGOUT FUNCTION (USE IN OTHER PAGES) */

function logout(){

localStorage.clear()
sessionStorage.clear()

window.location.href="login.html"

}

</script>

</body>
</html>
