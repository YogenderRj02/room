
<!DOCTYPE html>
<html>

<div class="container">

<a href="expenses.html"><button>Expenses</button></a>
<a href="members.html"><button>Members</button></a>
<a href="reports.html"><button>Reports</button></a>
</div>

<div id="summary"></div>

</div>

<script>

db.ref("rooms/room1/expenses").once("value",snap=>{

let total=0;

snap.forEach(c=>{
total+=Number(c.val().amount);
});

document.getElementById("summary").innerHTML=
'<div class="card"><b>Total Expense ₹'+total+'</b></div>';

});

</script>
